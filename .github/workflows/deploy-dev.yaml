name: Build, push and deploy til dev-fss
on: 
  push:
    paths:
      - 'Dockerfile'
      - 'deploy/.nais/dev.yaml'
jobs:
  deploy-t1:
    runs-on: ubuntu-latest
    name: Deploy docker image to dev
    steps:
      - uses: actions/checkout@v4
        with:
          path: deploy
      - name: Deploy kafka-manager-t1 to dev-fss
        uses: nais/deploy/actions/deploy@v2
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: dev-fss
          RESOURCE: deploy/.nais/team-oebs-kafka-manager-t1.yaml